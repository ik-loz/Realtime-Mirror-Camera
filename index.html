<!DOCTYPE html>
<html>
<head>
    <title>Realtime Webcam Mirror</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: #eee; margin: 0; padding: 20px; }
        video { display: none; } 
        canvas { border: 3px solid #00d4ff; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); background: #000; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { 
            padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; 
            transition: 0.3s; font-weight: bold; text-transform: uppercase;
        }
        #freezeBtn { background-color: #ff9800; color: white; }
        #freezeBtn.paused { background-color: #4caf50; }
        #saveBtn { background-color: #00d4ff; color: #121212; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>
    <h3>Espejo en Tiempo Real</h3>
    
    <video id="video" width="500" height="500" autoplay playsinline></video>
    <canvas id="canvas" width="500" height="500"></canvas>

    <div class="controls">
        <button id="freezeBtn">Congelar</button>
        <button id="saveBtn">Guardar Imagen</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const freezeBtn = document.getElementById('freezeBtn');
        const saveBtn = document.getElementById('saveBtn');

        let isPaused = false; // Estado para controlar la animación

        navigator.mediaDevices.getUserMedia({ video: { width: 500, height: 500 } })
            .then(stream => { 
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    render(); 
                };
            })
            .catch(err => console.error("Error:", err));

        function render() {
            // Si está pausado, no dibujamos el siguiente frame, pero mantenemos el bucle vivo
            if (!isPaused) {
                const w = canvas.width;
                const h = canvas.height;

                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    context.drawImage(video, 0, 0, w / 2, h, 0, 0, w / 2, h);
                    context.save(); 
                    context.scale(-1, 1);
                    context.drawImage(video, 0, 0, w / 2, h, -w, 0, w / 2, h);
                    context.restore();
                }
            }
            requestAnimationFrame(render);
        }

        // Lógica para Congelar / Reanudar
        freezeBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            freezeBtn.textContent = isPaused ? "Reanudar" : "Congelar";
            freezeBtn.classList.toggle('paused', isPaused);
        });

        // Lógica para Guardar la Imagen
        saveBtn.addEventListener('click', () => {
            // Creamos un enlace temporal
            const link = document.createElement('a');
            link.download = `espejo-${Date.now()}.png`; // Nombre del archivo con timestamp
            link.href = canvas.toDataURL('image/png'); // Convertimos el canvas a base64
            link.click(); // Forzamos el clic para descargar
        });
    </script>
</body>

</html>
